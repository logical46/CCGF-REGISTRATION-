<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCG Member ID Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --blue-deep: #0a1f44;
      --blue-mid: #1a3a6b;
      --blue-bright: #1e5fd4;
      --blue-light: #e8f0fe;
      --blue-pale: #f0f5ff;
      --gold: #c9a84c;
      --white: #ffffff;
      --gray-text: #5a6a85;
      --border: #d4e0f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-pale);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--blue-mid);
      margin-bottom: 20px;
      text-align: center;
    }

    /* === ID CARD === */
    .id-card {
      width: 100%;
      max-width: 340px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(10,31,68,0.18);
      animation: popIn 0.5s ease both;
      background: var(--white);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Card Header */
    .card-header {
      background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 100%);
      padding: 24px 20px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(201,168,76,0.08);
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 18px;
      background: var(--white);
      border-radius: 18px 18px 0 0;
    }

    .card-cross { color: var(--gold); font-size: 1.4rem; display: block; margin-bottom: 4px; }

    .card-org {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--white);
      line-height: 1.3;
    }

    .card-type-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 12px;
      background: var(--gold);
      color: var(--blue-deep);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Card Body */
    .card-body {
      padding: 20px 20px 16px;
    }

    /* Photo */
    .photo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .member-photo {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      object-fit: cover;
      background: var(--blue-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }

    .member-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Member Info */
    .member-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--blue-deep);
      text-align: center;
      margin-bottom: 4px;
    }

    .member-id {
      text-align: center;
      font-size: 0.72rem;
      color: var(--gray-text);
      margin-bottom: 16px;
      letter-spacing: 0.06em;
    }

    .member-id span {
      background: var(--blue-light);
      color: var(--blue-bright);
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Info rows */
    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--blue-pale);
      border-radius: 8px;
    }

    .info-label {
      font-size: 0.72rem;
      color: var(--gray-text);
      font-weight: 500;
    }

    .info-value {
      font-size: 0.8rem;
      color: var(--blue-deep);
      font-weight: 600;
      text-align: right;
      max-width: 60%;
    }

    /* QR Code */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 14px;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      border: 4px solid var(--blue-light);
    }

    .qr-label {
      font-size: 0.68rem;
      color: var(--gray-text);
      margin-top: 6px;
      text-align: center;
    }

    /* Card Footer */
    .card-footer {
      background: var(--blue-deep);
      padding: 10px 16px;
      text-align: center;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }

    /* Buttons */
    .actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .action-btn {
      padding: 13px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .action-btn:hover { opacity: 0.88; }

    .btn-screenshot {
      background: linear-gradient(135deg, var(--blue-bright), var(--blue-mid));
      color: var(--white);
    }

    .btn-home {
      background: var(--blue-light);
      color: var(--blue-bright);
    }

    /* Error */
    .error-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(10,31,68,0.1);
    }

    .error-icon { font-size: 3rem; margin-bottom: 12px; }
    .error-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--blue-deep); margin-bottom:8px; }
    .error-text { font-size: 0.85rem; color: var(--gray-text); line-height: 1.6; margin-bottom: 20px; }

    @media print {
      body { background: white; padding: 0; }
      .page-title, .actions { display: none; }
      .id-card { box-shadow: none; max-width: 100%; }
    }
  </style>
</head>
<body>

  <p class="page-title" id="pageTitle">🪪 Your Member ID Card</p>

  <div id="cardWrap"></div>

  <div class="actions" id="actions" style="display:none;">
    <button class="action-btn btn-screenshot" onclick="window.print()">📸 Screenshot / Print ID Card</button>
    <a href="home.html" class="action-btn btn-home">🏠 Go to Homepage</a>
  </div>

  <script>
    // Read data from URL parameters
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '';
    const phone = params.get('phone') || '';
    const unit = params.get('unit') || 'Not specified';
    const role = params.get('role') || 'None';
    const type = params.get('type') || '';
    const photo = params.get('photo') || '';
    const date = params.get('date') || new Date().toLocaleDateString('en-NG');

    // Only allow Members and Workers
    const allowed = ['Member', 'Worker'];

    const wrap = document.getElementById('cardWrap');

    if (!name || !allowed.includes(type)) {
      // Show error
      document.getElementById('pageTitle').style.display = 'none';
      wrap.innerHTML = `
        <div class="error-card">
          <div class="error-icon">🚫</div>
          <h2 class="error-title">ID Card Not Available</h2>
          <p class="error-text">
            Member ID cards are only available for registered <strong>Members</strong> and <strong>Workers</strong> of City Citadel of Grace Family.
          </p>
          <a href="index.html" class="action-btn btn-screenshot" style="display:inline-block; padding:12px 24px; border-radius:12px; background:linear-gradient(135deg,#1e5fd4,#1a3a6b); color:white; text-decoration:none; font-weight:600; font-size:0.9rem;">Register Now</a>
        </div>`;
    } else {
      // Generate membership number
      const memberNum = 'CCG' + date.replace(/\//g,'').slice(-4) + Math.floor(1000 + Math.random() * 9000);

      // Build photo HTML
      let photoHTML = '';
      if (photo && photo !== 'No Photo' && photo.startsWith('data:')) {
        photoHTML = `<div class="member-photo"><img src="${photo}" alt="Photo"/></div>`;
      } else {
        photoHTML = `<div class="member-photo" style="display:flex;align-items:center;justify-content:center;">👤</div>`;
      }

      wrap.innerHTML = `
        <div class="id-card" id="idCard">
          <div class="card-header">
            <span class="card-cross">✝</span>
            <div class="card-org">City Citadel of<br/>Grace Family</div>
            <span class="card-type-badge">${type}</span>
          </div>
          <div class="card-body">
            <div class="photo-wrap">${photoHTML}</div>
            <div class="member-name">${name}</div>
            <div class="member-id">ID: <span>${memberNum}</span></div>
            <div class="info-grid">
              <div class="info-row">
                <span class="info-label">Phone</span>
                <span class="info-value">${phone}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Service Unit</span>
                <span class="info-value">${unit}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Role</span>
                <span class="info-value">${role}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Date Registered</span>
                <span class="info-value">${date}</span>
              </div>
            </div>
            <div class="qr-wrap">
              <div id="qrcode"></div>
              <p class="qr-label">Scan to visit CCG Family portal</p>
            </div>
          </div>
          <div class="card-footer">© 2025 City Citadel of Grace Family · Uyo, Akwa Ibom</div>
        </div>`;

      // Generate QR Code
      new QRCode(document.getElementById('qrcode'), {
        text: 'https://logical46.github.io/CCGF-REGISTRATION-/home.html',
        width: 80,
        height: 80,
        colorDark: '#0a1f44',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });

      document.getElementById('actions').style.display = 'flex';
    }
  </script>

</body>
</html>
