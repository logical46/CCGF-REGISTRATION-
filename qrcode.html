<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCG Registration QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f5ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #1a3a6b;
      margin-bottom: 20px;
      text-align: center;
    }

    /* === CARD === */
    .qr-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(10,31,68,0.13);
      width: 100%;
      max-width: 360px;
      overflow: hidden;
      animation: popIn 0.5s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card-header {
      background: linear-gradient(135deg, #0a1f44 0%, #1a3a6b 100%);
      padding: 28px 24px 22px;
      text-align: center;
      position: relative;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 20px;
      background: #ffffff;
      border-radius: 20px 20px 0 0;
    }

    .card-cross {
      font-size: 2rem;
      color: #c9a84c;
      display: block;
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #ffffff;
      line-height: 1.3;
    }

    .card-tagline {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 300;
    }

    .card-body {
      padding: 24px 24px 20px;
      text-align: center;
    }

    .scan-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #5a6a85;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    #qrcode canvas, #qrcode img {
      border-radius: 12px;
      border: 6px solid #e8f0fe;
    }

    .card-url {
      font-size: 0.7rem;
      color: #1e5fd4;
      word-break: break-all;
      background: #e8f0fe;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .card-divider {
      width: 40px;
      height: 2px;
      background: #c9a84c;
      margin: 0 auto 14px;
      border-radius: 2px;
    }

    .card-instruction {
      font-size: 0.82rem;
      color: #5a6a85;
      line-height: 1.6;
    }

    .card-instruction strong {
      color: #0a1f44;
    }

    .card-footer {
      background: #0a1f44;
      padding: 12px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }

    /* === PRINT BUTTON === */
    .print-btn {
      margin-top: 24px;
      padding: 13px 36px;
      background: linear-gradient(135deg, #1e5fd4, #1a3a6b);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(30,95,212,0.3);
      transition: opacity 0.2s;
    }

    .print-btn:hover { opacity: 0.9; }

    .print-note {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #8a9bb5;
      text-align: center;
    }

    /* === PRINT STYLES === */
    @media print {
      body {
        background: white;
        padding: 0;
        justify-content: flex-start;
      }
      .page-title, .print-btn, .print-note { display: none; }
      .qr-card {
        box-shadow: none;
        max-width: 100%;
        border: 1px solid #ddd;
      }
    }
  </style>
</head>
<body>

  <p class="page-title">📲 Scan to Register — City Citadel of Grace Family</p>

  <div class="qr-card">

    <div class="card-header">
      <span class="card-cross">✝</span>
      <h1 class="card-name">City Citadel<br/>of Grace Family</h1>
      <p class="card-tagline">Member Registration Portal</p>
    </div>

    <div class="card-body">
      <p class="scan-label">📷 Scan to Register</p>
      <div id="qrcode"></div>
      <div class="card-url">logical46.github.io/CCGF-REGISTRATION-/</div>
      <div class="card-divider"></div>
      <p class="card-instruction">
        Point your phone camera at the QR code above.<br/>
        <strong>Fill the form & join the family!</strong>
      </p>
    </div>

    <div class="card-footer">
      © 2025 City Citadel of Grace Family
    </div>

  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Print This Card</button>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://logical46.github.io/CCGF-REGISTRATION-/",
      width: 200,
      height: 200,
      colorDark: "#0a1f44",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
